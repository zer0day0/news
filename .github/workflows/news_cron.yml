name: Auto Fetch News 4 Times/Day

on:
  schedule:
    - cron: '0 0,6,12,18 * * *'
  workflow_dispatch:

jobs:
  fetch-and-save:
    runs-on: ubuntu-latest
    env: # Thêm dòng này để ép GitHub dùng Node.js 24
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4 # Đã nâng cấp lên v4

      - name: Setup Python
        uses: actions/setup-python@v5 # Đã nâng cấp lên v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run Fetch News Script
        env:
          NEWSDATA_API_KEY: ${{ secrets.NEWSDATA_API_KEY }}
        run: python fetch_news.py

      - name: Commit and Push JSON file
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add news_data.json
          git commit -m "Auto-update news JSON" || echo "No changes to commit"
          git push
