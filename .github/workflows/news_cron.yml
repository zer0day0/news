name: Auto Fetch News 4 Times/Day

on:
  schedule:
    # Chạy 4 lần/ngày vào: 08:00, 14:00, 20:00, 02:00 (Giờ Việt Nam - UTC+7)
    - cron: '0 1,7,13,19 * * *'
  workflow_dispatch:

# Thêm khối này để tự động cấp quyền cho Bot được phép Push file JSON lên
permissions:
  contents: write

jobs:
  fetch-and-save:
    runs-on: ubuntu-latest
    env: 
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run Fetch News Script
        env:
          NEWSDATA_API_KEY: ${{ secrets.NEWSDATA_API_KEY }}
        run: python fetch_news.py

      - name: Commit and Push JSON file
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add news_data.json
          git commit -m "Auto-update news JSON" || echo "No changes to commit"
          git push

      - name: Ép jsDelivr xóa Cache (Chống bóng ma data cũ)
        run: |
          echo "Chờ 20 giây để GitHub đồng bộ file mới..."
          sleep 20
          echo "Đang dọn dẹp Cache trên jsDelivr..."
          curl -s "https://purge.jsdelivr.net/gh/zer0day0/news@main/news_data.json"
