name: Auto Fetch News 4 Times/Day

on:
  schedule:
    # Chạy vào các khung giờ: 00:00, 06:00, 12:00, 18:00 (Theo giờ UTC)
    # Giờ VN (UTC+7) sẽ là: 07:00, 13:00, 19:00, 01:00
    - cron: '0 0,6,12,18 * * *'
  workflow_dispatch: # Cho phép bạn bấm nút chạy bằng tay để test

jobs:
  fetch-and-save:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run Fetch News Script
        env:
          NEWSDATA_API_KEY: ${{ secrets.NEWSDATA_API_KEY }} # Nhớ add Key vào Settings > Secrets của Repo
        run: python fetch_news.py

      - name: Commit and Push JSON file
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add news_data.json
          git commit -m "Auto-update news JSON" || echo "No changes to commit"
          git push
